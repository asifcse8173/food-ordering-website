<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Checkout</title>

    <link rel="stylesheet"
          href="styling/checkout.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- ================= HEADER ================= -->

<header>

    <div class="logo">

        <i class="fa-solid fa-utensils"></i>

        Foodie

    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="menu.html">Menu</a>

        <a href="cart.html">Cart</a>

        <a href="checkout.html" class="active">

            Checkout

        </a>

    </nav>

</header>

<!-- ================= TITLE ================= -->

<section class="checkout-title">

    <h1>Checkout</h1>

    <p>Complete your order</p>

</section>

<!-- ================= CHECKOUT ================= -->

<section class="checkout-container">

    <!-- LEFT SIDE -->

    <div class="checkout-form">

        <h2>Billing Details</h2>

        <form id="checkoutForm">

            <div class="input-box">

                <label>Full Name</label>

                <input
                    id="name"
                    type="text"
                    placeholder="Enter Full Name"
                    required>

            </div>

            <div class="input-box">

                <label>Email</label>

                <input
                    id="email"
                    type="email"
                    placeholder="Enter Email"
                    required>

            </div>

            <div class="input-box">

                <label>Phone</label>

                <input
                    id="phone"
                    type="tel"
                    placeholder="Enter Mobile Number"
                    required>

            </div>

            <div class="input-box">

                <label>Address</label>

                <textarea
                    id="address"
                    rows="4"
                    placeholder="Enter Delivery Address"
                    required></textarea>

            </div>

            <div class="input-box">

                <label>City</label>

                <input
                    id="city"
                    type="text"
                    placeholder="Enter City"
                    required>

            </div>

            <div class="input-box">

                <label>Pincode</label>

                <input
                    id="pincode"
                    type="text"
                    placeholder="Enter Pincode"
                    required>

            </div>

        </form>

    </div>

    <!-- RIGHT SIDE -->

    <div class="order-summary">

        <h2>Order Summary</h2>

        <div id="order-items">

            <!-- JavaScript will display items -->

        </div>

        <hr>

        <div class="summary">

            <span>Subtotal</span>

            <span id="subtotal">₹0</span>

        </div>

        <div class="summary">

            <span>Delivery</span>

            <span>₹  3.00</span>

        </div>

        <div class="summary">

            <span>GST (5%)</span>

            <span id="gst">₹  0.00</span>

        </div>

        <hr>

        <div class="summary total">

            <span>Total</span>

            <span id="total">₹   0.00</span>

        </div>

        <button type="button" id="placeOrder">
            Place Order
        </button>

    </div>

</section>

<script src="styling/functionality/checkout.js"></script>

</body>

</html>
