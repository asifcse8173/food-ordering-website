<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Shopping Cart</title>

    <link rel="stylesheet"
          href="styling/cart.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- =========================
        HEADER
========================== -->

<header>

    <div class="logo">

        <i class="fa-solid fa-utensils"></i>

        Foodie

    </div>

    <nav>

        <a href="index.html">Home</a>

        <a href="menu.html">Menu</a>

        <a href="cart.html" class="active">

            <i class="fa-solid fa-cart-shopping"></i>

            Cart

        </a>

    </nav>

</header>

<!-- =========================
        PAGE TITLE
========================== -->

<section class="page-title">

    <h1>My Cart</h1>

    <p>Review your selected food items</p>

</section>

<!-- =========================
        CART CONTAINER
========================== -->

<section class="cart-container">

    <!-- LEFT SIDE -->

    <div class="cart-items">

        <!-- JavaScript will add cart items here -->

        <div id="cart-list">

        </div>

    </div>

    <!-- RIGHT SIDE -->

    <div class="cart-summary">

        <h2>Order Summary</h2>

        <div class="summary-row">

            <span>Subtotal</span>

            <span id="subtotal">Rs 0</span>

        </div>

        <div class="summary-row">

            <span>Delivery</span>

            <span>₹  3.00</span>

        </div>

        <div class="summary-row">

            <span>GST (5%)</span>

            <span id="gst">₹  0.00</span>

        </div>

        <hr>

        <div class="summary-row total">

            <span>Total</span>

            <span id="total">₹   0.00</span>

        </div>

        <button id="checkoutBtn">

            Proceed To Checkout

        </button>

    </div>

</section>

<!-- =========================
        EMPTY CART
========================== -->

<section id="empty-cart" style="display:none;">

    <img src="https://cdn-icons-png.flaticon.com/512/2038/2038854.png"
         width="200">

    <h2>Your Cart Is Empty</h2>

    <p>Add delicious food to your cart.</p>

    <a href="menu.html">

        <button>

            Go To Menu

        </button>

    </a>

</section>

<script src="styling/functionality/cart.js"></script>

</body>

</html>
