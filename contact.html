<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #1a202c;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f7fafc;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        textarea:focus {
            outline: none;
            background: white;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .reset-btn {
            background: #e2e8f0;
            color: #2d3748;
        }

        .reset-btn:hover {
            background: #cbd5e0;
        }

        .error-message {
            display: none;
            color: #e53e3e;
            font-size: 12px;
            margin-top: 6px;
        }

        .success-message {
            display: none;
            background: #c6f6d5;
            color: #22543d;
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            font-size: 14px;
            margin-top: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-group.error input,
        .form-group.error textarea {
            border-color: #e53e3e;
            background: #fff5f5;
        }

        .input-wrapper {
            position: relative;
        }

        .char-count {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 4px;
            text-align: right;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-message" id="successMessage">
            ✓ Thank you! Your message has been sent successfully. We&apos;ll get back to you soon.
        </div>

        <h1>Get in Touch</h1>
        <p class="subtitle">We'd love to hear from you. Send us a message!</p>

        <form id="contactForm" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input 
                    type="text" 
                    id="name" 
                    name="name" 
                    placeholder="your Name"
                    required
                >
                <div class="error-message" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    placeholder="you@example.com"
                    required
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <div class="input-wrapper">
                    <textarea 
                        id="message" 
                        name="message" 
                        placeholder="Your message here..."
                        required
                        maxlength="1000"
                    ></textarea>
                </div>
                <div class="char-count"><span id="charCount">0</span>/1000</div>
                <div class="error-message" id="messageError"></div>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">Send Message</button>
                <button type="reset" class="reset-btn">Clear</button>
            </div>

            <div class="loading" id="loading">
                <span class="spinner"></span>Sending your message...
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('contactForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const messageInput = document.getElementById('message');
        const successMessage = document.getElementById('successMessage');
        const loading = document.getElementById('loading');
        const charCount = document.getElementById('charCount');

        // Update character count
        messageInput.addEventListener('input', () => {
            charCount.textContent = messageInput.value.length;
        });

        // Clear error message when user starts typing
        nameInput.addEventListener('focus', () => clearError('nameError'));
        emailInput.addEventListener('focus', () => clearError('emailError'));
        messageInput.addEventListener('focus', () => clearError('messageError'));

        function clearError(errorId) {
            const errorElement = document.getElementById(errorId);
            const formGroup = errorElement.closest('.form-group');
            errorElement.style.display = 'none';
            formGroup.classList.remove('error');
        }

        function showError(inputId, errorId, message) {
            const input = document.getElementById(inputId);
            const errorElement = document.getElementById(errorId);
            const formGroup = input.closest('.form-group');
            
            errorElement.textContent = message;
            errorElement.style.display = 'block';
            formGroup.classList.add('error');
        }

        function validateForm() {
            let isValid = true;

            // Validate name
            if (nameInput.value.trim().length < 2) {
                showError('name', 'nameError', 'Please enter your full name (at least 2 characters)');
                isValid = false;
            }

            // Validate email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(emailInput.value.trim())) {
                showError('email', 'emailError', 'Please enter a valid email address');
                isValid = false;
            }

            // Validate message
            if (messageInput.value.trim().length < 10) {
                showError('message', 'messageError', 'Message must be at least 10 characters long');
                isValid = false;
            }

            return isValid;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            loading.style.display = 'block';
            successMessage.style.display = 'none';

            try {
                // Simulate sending email (in production, you would send to a backend service)
                // Example: EmailJS, Formspree, or your own backend API
                
                // For demo purposes, we'll simulate a successful submission
                await new Promise(resolve => setTimeout(resolve, 1500));

                // Show success message
                successMessage.style.display = 'block';
                form.reset();
                charCount.textContent = '0';

                // Hide success message after 5 seconds
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 5000);

            } catch (error) {
                console.error('Error sending message:', error);
                showError('message', 'messageError', 'Failed to send message. Please try again.');
            } finally {
                loading.style.display = 'none';
            }
        });

        // Auto-focus first field
        nameInput.focus();
    </script>
</body>
</html>
